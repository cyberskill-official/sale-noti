name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node and pnpm versions are read from the repo files so CI never drifts from local:
#   - Node:  .nvmrc                          (currently 24.12.0)
#   - pnpm:  package.json "packageManager"   (currently pnpm@11.1.2)
# To bump either, edit those files; corepack picks pnpm up automatically from packageManager.

jobs:
  drift-catchers:
    name: Drift catchers (fr-check + legal-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      # pnpm 11+ requires the build-script allowlist to be recorded in the lockfile's
      # settings: block. Until the lockfile is regenerated locally (pnpm install
      # --lockfile-only) to bake in onlyBuiltDependencies, we pass the allowlist
      # explicitly on the CLI via --allow-build. The list MUST stay in sync with
      # pnpm-workspace.yaml's onlyBuiltDependencies.
      - run: pnpm install --frozen-lockfile --allow-build="@nestjs/core,@sentry/cli,core-js,esbuild,msgpackr-extract,protobufjs,sharp"
      - name: FR authoring conformance
        run: pnpm fr:check
      - name: Legal disclosure conformance
        run: pnpm legal:check

  pin-check:
    name: Pin check (FR-AUTH-001 §1 #1 + workflow §11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auth.js v5.0.0-beta.25 exact pin
        run: |
          if [ -f apps/web/package.json ]; then
            if ! grep -q '"next-auth": "5.0.0-beta.25"' apps/web/package.json; then
              echo "::error::FR-AUTH-001 §1 #1 violated — next-auth must be pinned to exact 5.0.0-beta.25"
              exit 1
            fi
          fi

  build:
    name: Build + typecheck + test
    runs-on: ubuntu-latest
    needs: [drift-catchers, pin-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      # pnpm 11+ requires the build-script allowlist to be recorded in the lockfile's
      # settings: block. Until the lockfile is regenerated locally (pnpm install
      # --lockfile-only) to bake in onlyBuiltDependencies, we pass the allowlist
      # explicitly on the CLI via --allow-build. The list MUST stay in sync with
      # pnpm-workspace.yaml's onlyBuiltDependencies.
      - run: pnpm install --frozen-lockfile --allow-build="@nestjs/core,@sentry/cli,core-js,esbuild,msgpackr-extract,protobufjs,sharp"
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
